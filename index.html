    <div class="container">
       
       
       <th style="color: white;">Miercoles 26 - 02 - 2025 USD 64.01</th>

        <div class="conversion">
            <div class="currency">
                <h3> Bolívar venezolano  <br> 🇻🇪</h3>
                <input type="number" id="bolivares" placeholder="Bs. 0" />
            </div>
            <div class="arrow">⇄</div>
            <div class="currency">
                <h3>Dólar estadounidense<br>🇺🇸</h3>
                <input type="number" id="dolares" placeholder="$ 0" disabled />
            </div>
        </div>
        <button id="convertBtn">Convertir</button>
        <div class="rates">
            
       
          
    </div>
     
    <script> document.getElementById('convertBtn').addEventListener('click', function() {
    const bolivares = parseFloat(document.getElementById('bolivares').value);
    const exchangeRate = 0077; // Tasa de cambio de bolívares a dólares
    const dolares = bolivares / exchangeRate;

    document.getElementById('dolares').value = dolares.toFixed(2);
});

    function convertirDivisa() {
        const dolar = document.getElementById('dolarInput').value;
        const tasaCambio = 64.01; // Tasa de cambio actual (1 USD = 64.01 VES)
        const resultado = dolar * tasaCambio;
        document.getElementById('resultado').innerText = `El monto en bolívares es: ${resultado} bs`;
    }


</script>

<body>
<h2>Dólar a Bolívar</h2>
<input type="number" id="dolarInput" placeholder="Ingresar en $">
<button onclick="convertirDivisa()">Convertir</button>
<p id="resultado"></p>
